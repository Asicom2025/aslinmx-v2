services:
  db:
    image: postgres:15-alpine
    container_name: aslin_db
    restart: unless-stopped
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - aslin_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: aslin_backend
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./db:/app/db:ro
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"
    networks:
      - aslin_network

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: https://app.aslin.online
    container_name: aslin_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - aslin_network

volumes:
  postgres_data:

networks:
  aslin_network:
    driver: bridge
