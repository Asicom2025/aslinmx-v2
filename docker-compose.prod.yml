services:
  db:
    image: postgres:15-alpine
    container_name: aslin_db
    restart: unless-stopped
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - aslin_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/asicom2025/aslinmx-v2/aslin-backend:latest
    container_name: aslin_backend
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./db:/app/db:ro
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"
    networks:
      - aslin_network

  # Frontend: NEXT_PUBLIC_* se incrusta en el bundle al construir la imagen (Dockerfile + CI).
  # El .env del servidor no basta para esas claves si la imagen se construyó sin ellas.
  frontend:
    image: ghcr.io/asicom2025/aslinmx-v2/aslin-frontend:latest
    container_name: aslin_frontend
    restart: unless-stopped
    env_file: .env
    depends_on:
      - backend
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - aslin_network

volumes:
  postgres_data:

networks:
  aslin_network:
    driver: bridge
