services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - aslin_network

  backend:
    build: ./backend
    container_name: aslin_backend
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./db:/app/db:ro
    depends_on:
      - db
    ports:
      - "127.0.0.1:8000:8000"
    networks:
      - aslin_network

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: https://app.aslin.online
    container_name: aslin_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - aslin_network

volumes:
  postgres_data:

networks:
  aslin_network:
    driver: bridge
