name: Build & Deploy Aslin

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: asicom2025/aslinmx-v2

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login GHCR
        run: echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build & Push Backend
        run: |
          docker build -t $REGISTRY/$IMAGE_NAMESPACE/aslin-backend:latest ./backend
          docker push $REGISTRY/$IMAGE_NAMESPACE/aslin-backend:latest


      - name: Build & Push Frontend
        run: |
          docker build -t $REGISTRY/$IMAGE_NAMESPACE/aslin-frontend:latest \
            --build-arg NEXT_PUBLIC_API_URL=https://app.aslin.online \
            ./frontend
          docker push $REGISTRY/$IMAGE_NAMESPACE/aslin-frontend:latest

      - name: Deploy on Server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          passphrase: ${{ secrets.SERVER_SSH_PASSPHRASE }}
          script: |
            cd /opt/app
            docker compose -f docker-compose.prod.yml pull --ignore-pull-failures
            docker compose -f docker-compose.prod.yml up -d --force-recreate --remove-orphans
