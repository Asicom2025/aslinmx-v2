name: Build & Deploy Aslin

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: asicom2025/aslinmx-v2

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login GHCR
        run: echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build & Push Backend
        run: |
          docker build -t $REGISTRY/$IMAGE_NAMESPACE/aslin-backend:latest ./backend
          docker push $REGISTRY/$IMAGE_NAMESPACE/aslin-backend:latest


      - name: Build & Push Frontend
        env:
          NEXT_PUBLIC_GOOGLE_CALENDAR_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_GOOGLE_CALENDAR_CLIENT_ID }}
          NEXT_PUBLIC_GOOGLE_CALENDAR_API_KEY: ${{ secrets.NEXT_PUBLIC_GOOGLE_CALENDAR_API_KEY }}
        run: |
          docker build -t $REGISTRY/$IMAGE_NAMESPACE/aslin-frontend:latest \
            --build-arg NEXT_PUBLIC_API_URL=https://app.aslin.online \
            --build-arg NEXT_PUBLIC_GOOGLE_CALENDAR_CLIENT_ID="$NEXT_PUBLIC_GOOGLE_CALENDAR_CLIENT_ID" \
            --build-arg NEXT_PUBLIC_GOOGLE_CALENDAR_API_KEY="$NEXT_PUBLIC_GOOGLE_CALENDAR_API_KEY" \
            ./frontend
          docker push $REGISTRY/$IMAGE_NAMESPACE/aslin-frontend:latest

      - name: Copy docker-compose to Server
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          passphrase: ${{ secrets.SERVER_SSH_PASSPHRASE }}
          source: "docker-compose.prod.yml"
          target: "/opt/app"

      - name: Deploy on Server
        uses: appleboy/ssh-action@v1
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          passphrase: ${{ secrets.SERVER_SSH_PASSPHRASE }}
          envs: GHCR_TOKEN
          script: |
            set -e
            cd /opt/app
            echo "$GHCR_TOKEN" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --force-recreate --remove-orphans
            docker image prune -f
