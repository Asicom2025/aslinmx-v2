services:
  db:
    image: postgres:15-alpine
    container_name: aslin_db
    restart: unless-stopped
    env_file: .env
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/aslin_completo.sql:/docker-entrypoint-initdb.d/01_aslin_completo.sql
      # Scripts adicionales (p. ej. migrate_catalogos_litigio.sql) vía: psql -f /mnt/db/...
      - ./db:/mnt/db:ro
    networks:
      - aslin_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: aslin_backend
    restart: unless-stopped
    env_file: .env
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./db:/app/db:ro
      - ./logs/backend:/logs
    networks:
      - aslin_network
    environment:
      - WATCHFILES_FORCE_POLLING=true
      - STRUCTURED_LOG_DIR=/logs
      - STRUCTURED_LOG_TARGET=${STRUCTURED_LOG_TARGET:-both}
    command: sh -c "python init_db.py && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: aslin_frontend
    restart: unless-stopped
    env_file: .env
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    networks:
      - aslin_network
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - WATCHPACK_POLLING_INTERVAL=1000
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      - NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=${NEXT_PUBLIC_GOOGLE_MAPS_API_KEY}
      - NEXT_PUBLIC_GOOGLE_CALENDAR_CLIENT_ID=${NEXT_PUBLIC_GOOGLE_CALENDAR_CLIENT_ID}
      - NEXT_PUBLIC_GOOGLE_CALENDAR_API_KEY=${NEXT_PUBLIC_GOOGLE_CALENDAR_API_KEY}
      - NEXT_PUBLIC_RECAPTCHA_SITE_KEY=${NEXT_PUBLIC_RECAPTCHA_SITE_KEY}
    command: sh -c "npm install && npm run dev"

volumes:
  postgres_data:
  frontend_node_modules:

networks:
  aslin_network:
    driver: bridge
