<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>README - ASLIN 2.0</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; max-width: 800px; margin: 0 auto; padding: 2rem; line-height: 1.6; color: #333; }
    h1, h2, h3 { margin-top: 1.5em; color: #111; }
    pre, code { background: #f5f5f5; padding: 0.2em 0.4em; border-radius: 4px; font-size: 0.9em; }
    pre { padding: 1rem; overflow-x: auto; }
    pre code { padding: 0; }
    table { border-collapse: collapse; width: 100%; margin: 1em 0; }
    th, td { border: 1px solid #ddd; padding: 0.5rem 0.75rem; text-align: left; }
    th { background: #f5f5f5; }
    a { color: #0066cc; }
    blockquote { border-left: 4px solid #ddd; margin: 1em 0; padding-left: 1em; color: #555; }
    hr { border: none; border-top: 1px solid #eee; margin: 2em 0; }
  </style>
</head>
<body>
  <div id="content">Cargando README…</div>
  <script>
    fetch('README.md')
      .then(r => r.text())
      .then(md => {
        document.getElementById('content').innerHTML = marked.parse(md);
      })
      .catch(() => {
        document.getElementById('content').innerHTML = '<p>No se pudo cargar README.md. Abre esta página sirviendo la carpeta del proyecto por HTTP (ver instrucciones abajo).</p><pre># En la raíz del proyecto:\nnpx serve .\n# Luego abre: http://localhost:3000/preview-readme.html</pre>';
      });
  </script>
</body>
</html>
