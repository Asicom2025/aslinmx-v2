# Configuración para nginx del servidor (NO Docker)
# Copiar a /etc/nginx/conf.d/ o sites-available del servidor
# Frontend - aslin.online -> localhost:3000 (contenedor frontend)
server {
    listen 80;
    server_name aslin.online;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# API - app.aslin.online -> localhost:8000 (contenedor backend)
server {
    listen 80;
    server_name app.aslin.online;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}